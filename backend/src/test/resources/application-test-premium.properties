# ============================================================
# Test Profili: test-premium
# Premium kullanici senaryolarini test eder.
# ============================================================

# H2 bellekte veritabani (gercek PostgreSQL gerekmez)
spring.datasource.url=jdbc:h2:mem:testdb_premium;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=false;MODE=PostgreSQL
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect

# SQL init test icin kapali (TestConfiguration Mock Data kullanir)
spring.sql.init.mode=never

# JWT test secret
app.jwt.secret=testGizliAnahtarPremiumKullaniciicinMinimum256Bit
app.jwt.expiration-ms=3600000

# Tavsiye esik degeri - test icin dusuruldu
app.tavsiye.harcama-esik-yuzdesi=10

# Log seviyesi
logging.level.com.akillibutce=DEBUG
logging.level.org.springframework.security=WARN
