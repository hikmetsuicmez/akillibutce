# Uygulama Adi
spring.application.name=akilli-butce-backend
server.port=8080

# PostgreSQL Veritabani Baglantisi
spring.datasource.url=${DB_URL}
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver

# Hibernate / JPA Ayarlari
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.format_sql=true

# Baslangic SQL
spring.sql.init.mode=always
spring.jpa.defer-datasource-initialization=true

# JWT Ayarlari
app.jwt.secret=${JWT_SECRET}
app.jwt.expiration-ms=${JWT_EXPIRATION_MS}

# CORS - Frontend adresi (Production'da FRONTEND_URL env degiskeni kullanilir)
app.cors.allowed-origins=${FRONTEND_URL:http://localhost:5173,http://localhost:3000}

# Actuator - Railway health check
management.endpoints.web.exposure.include=health
management.endpoint.health.show-details=never

# Premium Abonelik Ucretleri
app.premium.aylik-ucret=59.00
app.premium.yillik-ucret=499.00

# Tavsiye Motoru Esik Degerleri (Yuzde)
app.tavsiye.harcama-esik-yuzdesi=15
